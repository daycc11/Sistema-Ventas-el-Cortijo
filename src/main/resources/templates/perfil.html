<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Perfil de Usuario')}"></head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar('perfil')}"></div>

    <!-- Contenido Principal -->
    <main class="flex-1 p-4 md:p-6 overflow-y-auto">

        <!-- Header -->
        <div th:replace="~{fragments/header :: appHeader('Perfil')}"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Tarjeta de Perfil -->
            <div class="lg:col-span-1">
                <div class="card flex flex-col items-center text-center">
                    <div class="w-24 h-24 rounded-full mb-4 shadow-lg flex items-center justify-center bg-gray-100">
                        <svg class="w-16 h-16" style="color:#67748e" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <h3 id="perfil-nombre-completo" class="text-xl font-bold" style="color:#344767">Cargando...</h3>
                    <p id="perfil-rol" class="text-sm font-semibold mt-1" style="color:#2dce89">Cargando rol...</p>
                </div>
            </div>

            <!-- Formularios de Perfil -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Datos Personales -->
                <div class="card">
                    <h3 class="text-lg font-bold mb-4">Datos Personales</h3>
                    <form id="form-perfil" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="label-caps" for="perfil-nombre">Nombre</label>
                                <input type="text" id="perfil-nombre" class="w-full mt-2 p-3 border border-gray-300 rounded-md">
                            </div>
                            <div>
                                <label class="label-caps" for="perfil-apellido">Apellido</label>
                                <input type="text" id="perfil-apellido" class="w-full mt-2 p-3 border border-gray-300 rounded-md">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="label-caps" for="perfil-dni">DNI (Usuario)</label>
                                <input type="text" id="perfil-dni" class="w-full mt-2 p-3 border border-gray-300 rounded-md bg-gray-50" readonly>
                            </div>
                            <div>
                                <label class="label-caps" for="perfil-email">Correo Electrónico</label>
                                <input type="email" id="perfil-email" class="w-full mt-2 p-3 border border-gray-300 rounded-md" placeholder="correo@ejemplo.com">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="label-caps" for="perfil-telefono">Teléfono</label>
                                <input type="tel" id="perfil-telefono" class="w-full mt-2 p-3 border border-gray-300 rounded-md">
                            </div>
                            <div>
                                <label class="label-caps" for="perfil-direccion">Dirección</label>
                                <input type="text" id="perfil-direccion" class="w-full mt-2 p-3 border border-gray-300 rounded-md">
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        </div>
                    </form>
                </div>

                <!-- Cambiar Contraseña -->
                <div class="card">
                    <h3 class="text-lg font-bold mb-4">Cambiar Contraseña</h3>
                    <form id="form-cambiar-password" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="label-caps" for="password-actual">Contraseña Actual</label>
                                <input type="password" id="password-actual" required class="w-full mt-2 p-3 border border-gray-300 rounded-md">
                            </div>
                            <div>
                                <label class="label-caps" for="password-nueva">Nueva Contraseña</label>
                                <input type="password" id="password-nueva" required class="w-full mt-2 p-3 border border-gray-300 rounded-md">
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="submit" class="btn bg-gray-200" style="color:#344767">Actualizar Contraseña</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/perfil.js}"></script>

</body>
</html>
