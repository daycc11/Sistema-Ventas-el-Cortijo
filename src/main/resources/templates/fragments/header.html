<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Header fragment: recibe 'pageTitle' para el breadcrumb -->
<header th:fragment="appHeader(pageTitle)" class="flex justify-between items-center mb-6">
    <div>
        <p class="text-sm" style="color:#67748e">
            Páginas / <span class="font-semibold" style="color:#344767" th:text="${pageTitle}">Página</span>
        </p>
        <h1 class="text-2xl font-bold" style="color:#344767" th:text="${pageTitle}">Página</h1>
    </div>
    <div class="flex items-center gap-4">
        <!-- Búsqueda -->
        <div class="relative hidden md:block">
            <input type="text" placeholder="Buscar..."
                   class="bg-white rounded-md py-2 pl-10 pr-4 focus:outline-none focus:ring-2"
                   style="border:1px solid #ced4da">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        </div>
        <!-- Usuario -->
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6" style="color:#67748e" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span id="nombre-usuario-header" class="font-semibold hidden sm:block" style="color:#344767">Cargando...</span>
        </div>
        <!-- Logout -->
        <a th:href="@{/perform_logout}" title="Cerrar Sesión" class="transition-colors hover:text-red-600" style="color:#67748e">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
        </a>
    </div>
</header>

</body>
</html>
