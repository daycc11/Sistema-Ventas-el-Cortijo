<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="appHead(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - El Cortijo'">El Cortijo</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Open Sans', 'sans-serif'] },
                    colors: {
                        'brand-primary-violet': '#825ee4',
                        'brand-primary-blue': '#39a1f8',
                        'brand-text-title': '#344767',
                        'brand-text-secondary': '#67748e',
                        'brand-success': '#2dce89',
                        'brand-warning': '#fb6340',
                        'brand-danger': '#f5365c',
                        'brand-info': '#1171ef',
                    }
                }
            }
        }
    </script>

    <!-- CSS Global -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
</html>
